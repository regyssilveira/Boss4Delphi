name: SBOM CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    name: Delphi 13 / Win32 + Win64 / SBOM
    runs-on: [self-hosted, windows, delphi-13]
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify tool prerequisites
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          foreach ($tool in @('docker', 'gh', 'java')) {
            if (-not (Get-Command $tool -ErrorAction SilentlyContinue)) {
              throw "Ferramenta obrigatória ausente no runner: $tool"
            }
          }

      - name: Compile, test, generate and validate SBOMs
        shell: pwsh
        run: ./scripts/ci-verify-sbom.ps1

      - name: Upload verified SBOMs
        uses: actions/upload-artifact@v4
        with:
          name: boss4d-sbom-${{ github.sha }}
          path: |
            .ci-build/sbom-win32/boss4d.cdx.json
            .ci-build/sbom-win32/boss4d.spdx.json
            .ci-build/sbom-win32/boss4d.vex.cdx.json
            .ci-build/sbom-win32/boss4d.cdx.intoto.json
            .ci-build/sbom-win32/boss4d.spdx.intoto.json
          if-no-files-found: error
          retention-days: 30
