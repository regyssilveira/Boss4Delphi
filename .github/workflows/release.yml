name: Release Automation

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    name: Build & Publish Release Assets
    runs-on: self-hosted # Executado em maquina local/servidor configurado como runner contendo Delphi instalado

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Compile Win32 & Win64 Binaries
        shell: cmd
        run: |
          echo ========================================================
          echo Carregando Variaveis de Ambiente do Delphi
          echo ========================================================
          call "C:\Program Files (x86)\Embarcadero\Studio\37.0\bin\rsvars.bat"
          
          echo ========================================================
          echo Compilando Boss4D em Win32
          echo ========================================================
          if not exist bin mkdir bin
          dcc32 -B -Q -U"src" -U"src\Core\Domain" -U"src\Core\Ports" -U"src\Core\Services" -U"src\Adapters\Json" -U"src\Adapters\Http" -U"src\Adapters\Git" -U"src\Adapters\Registry" -U"src\Adapters\Compiler" -U"src\Adapters\Logger" -U"src\CLI" -E"bin" src\Boss4D.dpr
          if %ERRORLEVEL% neq 0 exit /b %ERRORLEVEL%
          move /Y bin\Boss4D.exe bin\boss4d-win32.exe

          echo ========================================================
          echo Compilando Boss4D em Win64
          echo ========================================================
          dcc64 -B -Q -U"src" -U"src\Core\Domain" -U"src\Core\Ports" -U"src\Core\Services" -U"src\Adapters\Json" -U"src\Adapters\Http" -U"src\Adapters\Git" -U"src\Adapters\Registry" -U"src\Adapters\Compiler" -U"src\Adapters\Logger" -U"src\CLI" -E"bin" src\Boss4D.dpr
          if %ERRORLEVEL% neq 0 exit /b %ERRORLEVEL%
          move /Y bin\Boss4D.exe bin\boss4d-win64.exe

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            bin/boss4d-win32.exe
            bin/boss4d-win64.exe
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
